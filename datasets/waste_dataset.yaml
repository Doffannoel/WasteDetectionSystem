# waste_dataset.yaml — Konfigurasi dataset untuk YOLO training
# Di-generate otomatis oleh prepare_dataset.py

path: C:\Kuliah\Semester 6\Big Data for Social Media Campaign\waste-detection\WasteDetectionSystem\datasets\final

train: train/images
val:   val/images
test:  test/images

nc: 6
names: ['plastik', 'kertas_kardus', 'logam', 'kaca', 'kantong_plastik', 'sampah']

# Catatan kelas:
# 0 - plastik         : botol plastik, gelas plastik, wadah plastik
# 1 - kertas_kardus   : kertas, kardus, kotak
# 2 - logam           : kaleng, logam, foil
# 3 - kaca            : botol kaca, pecahan kaca
# 4 - kantong_plastik : kantong plastik, sachet, bungkus
# 5 - sampah          : sampah campuran, tidak teridentifikasi
